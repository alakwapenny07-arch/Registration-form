<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form with Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    /* Menu styling */
    .menu-bar {
      background: #4CAF50;
      padding: 10px;
      display: flex;
      gap: 20px;
    }
    .menu-item {
      position: relative;
      color: white;
      cursor: pointer;
    }
    .dropdown {
      display: none;
      position: absolute;
      background: #f9f9f9;
      min-width: 150px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }
    .dropdown a {
      display: block;
      padding: 8px;
      text-decoration: none;
      color: black;
    }
    .dropdown a:hover {
      background: #ddd;
    }
    .menu-item:hover .dropdown {
      display: block;
    }
    /* Form styling */
    form {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      background: #f4f4f4;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Menu Bar -->
  <div class="menu-bar">
    <div class="menu-item">File
      <div class="dropdown">
        <a href="#">New → Form</a>
      </div>
    </div>
    <div class="menu-item">Edit
      <div class="dropdown">
        <a href="#">Cut</a>
        <a href="#">Copy</a>
        <a href="#">Paste</a>
      </div>
    </div>
    <div class="menu-item">Format
      <div class="dropdown">
        <a href="#">Italic</a>
        <a href="#">Underline</a>
        <a href="#">Bold</a>
      </div>
    </div>
  </div>

  <!-- Skeleton Form -->
  <form>
    <h2>Sample Form</h2>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email">

    <label for="comments">Comments:</label>
    <textarea id="comments" name="comments"></textarea>

    <button type="submit">Submit</button>
  </form>

</body>
</html>
