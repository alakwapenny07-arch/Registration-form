
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Unit Registration</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #FAFAFA;
    color: #2C3E50;
    margin: 0;
}

/* MENU */
.menu {
    display: flex;
    background-color: #00B4D8;
    padding: 10px;
}

.menu-item {
    position: relative;
    margin-right: 20px;
    color: white;
    cursor: pointer;
}

.dropdown {
    display: none;
    position: absolute;
    background-color: #E9ECEF;
    color: #2C3E50;
    padding: 10px;
}

.menu-item:hover .dropdown {
    display: block;
}

/* FORM */
.container {
    width: 60%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: 1px solid #E9ECEF;
    border-radius: 5px;
}

button {
    background-color: #00B4D8;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    border-radius: 5px;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
    <div class="menu-item">File
        <div class="dropdown">
            <p onclick="newForm()">New Form</p>
        </div>
    </div>

    <div class="menu-item">Edit
        <div class="dropdown">
            <p onclick="cutText()">Cut</p>
            <p onclick="copyText()">Copy</p>
            <p onclick="pasteText()">Paste</p>
        </div>
    </div>

    <div class="menu-item">Format
        <div class="dropdown">
            <p onclick="formatText('italic')">Italic</p>
            <p onclick="formatText('underline')">Underline</p>
            <p onclick="formatText('bold')">Bold</p>
        </div>
    </div>
</div>

<!-- FORM -->
<div class="container">
    <h2>Student Unit Registration</h2>

    <form id="registrationForm">
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Registration Number" required>

        <select required>
            <option value="">Select Course</option>
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Business</option>
        </select>

        <textarea id="textArea" placeholder="Additional Notes"></textarea>

        <button type="submit">Register</button>
    </form>
</div>

<script>
let clipboard = "";

function newForm() {
    document.getElementById("registrationForm").reset();
}

function cutText() {
    let textArea = document.getElementById("textArea");
    clipboard = textArea.value;
    textArea.value = "";
}

function copyText() {
    let textArea = document.getElementById("textArea");
    clipboard = textArea.value;
}

function pasteText() {
    let textArea = document.getElementById("textArea");
    textArea.value += clipboard;
}

function formatText(type) {
    let textArea = document.getElementById("textArea");

    if (type === "bold") {
        textArea.style.fontWeight = "bold";
    } 
    else if (type === "italic") {
        textArea.style.fontStyle = "italic";
    } 
    else if (type === "underline") {
        textArea.style.textDecoration = "underline";
    }
}
</script>

</body>
</html>
