<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration - o608-hub.github.io</title>
  <style>
    :root {
      --primary: #17A2B8;
      --bg: #FAFAFA;
      --text: #2C3E50;
      --neutral: #E9ECEF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 10px;
      line-height: 1.5;
    }

    .form-container {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .section {
      padding: 25px 20px;
      background: #FFF9E6;           /* Light yellow tint like original */
    }

    .section + .section {
      border-top: 1px solid #eee;
    }

    h2 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: 700;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      font-size: 15px;
      color: #2C3E50;
    }

    input[type="text"], 
    input[type="email"], 
    input[type="tel"], 
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--neutral);
      border-radius: 6px;
      background: white;
      font-size: 16px;
      color: var(--text);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
    }

    .btn-submit:hover {
      background: #138496;
    }

    .btn-reset {
      background: #F9C74F;        /* Bright yellow like original */
      color: #2C3E50;
    }

    .btn-reset:hover {
      background: #f4b93a;
    }

    /* Top blue bar like original */
    .top-bar {
      background: #0066CC;
      color: white;
      padding: 8px 15px;
      font-size: 15px;
      display: flex;
      gap: 25px;
    }

    .top-bar span {
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Top menu bar -->
  <div class="top-bar">
    <span><strong>File</strong></span>
    <span><strong>Edit</strong></span>
    <span><strong>Format</strong></span>
  </div>

  <div class="form-container">

    <!-- Student Registration -->
    <div class="section">
      <h2>Student Registration</h2>

      <label>Full Name</label>
      <input type="text" placeholder="">

      <label>Student ID</label>
      <input type="text" placeholder="">

      <label>Email</label>
      <input type="email" placeholder="">

      <label>Phone Number</label>
      <input type="tel" placeholder="">

      <label>Date of Birth</label>
      <input type="date">

      <label>Gender</label>
      <select>
        <option>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label>Course/Program</label>
      <input type="text" placeholder="">

      <label>Year of Study</label>
      <select>
        <option>Select Year</option>
        <option>Year 1</option>
        <option>Year 2</option>
        <option>Year 3</option>
        <option>Year 4</option>
      </select>

      <label>Address</label>
      <textarea rows="3"></textarea>

      <label>Additional Comments</label>
      <textarea rows="4"></textarea>

      <div class="buttons">
        <button class="btn-submit">Submit</button>
        <button class="btn-reset">Reset</button>
      </div>
    </div>

    <!-- Unit Registration -->
    <div class="section">
      <h2>Unit Registration</h2>

      <label>Unit Name</label>
      <input type="text" placeholder="">

      <label>Unit Code</label>
      <input type="text" placeholder="">

      <label>Lecturer</label>
      <input type="text" placeholder="">

      <label>Semester</label>
      <select>
        <option>Select Semester</option>
        <option>Semester 1</option>
        <option>Semester 2</option>
      </select>

      <label style="margin-top: 18px; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" style="width: auto; transform: scale(1.2);">
        Active Unit
      </label>

      <div class="buttons">
        <button class="btn-submit">Register</button>
        <button class="btn-reset">Reset</button>
      </div>
    </div>

  </div>

</body>
</html>
