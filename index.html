<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Unit Registration</title>
  <style>
    :root {
      --primary: #17A2B8;
      --bg: #FAFAFA;
      --text: #2C3E50;
      --neutral: #E9ECEF;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .form-section {
      padding: 30px;
    }

    h2 {
      color: var(--primary);
      margin-top: 0;
      border-bottom: 2px solid var(--neutral);
      padding-bottom: 10px;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: 600;
      color: #34495E;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--neutral);
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(23, 162, 184, 0.15);
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      flex: 1;
    }

    .btn-submit:hover {
      background: #138496;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: #E9ECEF;
      color: var(--text);
      flex: 1;
    }

    .btn-reset:hover {
      background: #dee2e6;
    }

    /* Menu Simulation */
    .menu-bar {
      background: #2C3E50;
      color: white;
      padding: 8px 15px;
      display: flex;
      gap: 25px;
      font-size: 15px;
    }

    .menu-item {
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <!-- Top Menu Bar -->
  <div class="menu-bar">
    <div class="menu-item"><strong>File</strong>
      <span style="font-size:12px; opacity:0.8;">▼</span>
    </div>
    <div class="menu-item"><strong>Edit</strong>
      <span style="font-size:12px; opacity:0.8;">▼</span>
    </div>
    <div class="menu-item"><strong>Format</strong>
      <span style="font-size:12px; opacity:0.8;">▼</span>
    </div>
  </div>

  <div class="container">

    <!-- Student Registration -->
    <div class="header">Student Registration</div>
    <div class="form-section">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name" required/>

      <label>Student ID</label>
      <input type="text" placeholder="e.g. BCOM/12345/2023" required/>

      <label>Email</label>
      <input type="email" placeholder="student@university.ac.ke" required/>

      <label>Phone Number</label>
      <input type="tel" placeholder="+254 7XX XXX XXX" required/>

      <label>Date of Birth</label>
      <input type="date" required/>

      <label>Gender</label>
      <select required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label>Course/Program</label>
      <input type="text" placeholder="e.g. Bachelor of Commerce" required/>

      <label>Year of Study</label>
      <select required>
        <option value="">Select Year</option>
        <option>Year 1</option>
        <option>Year 2</option>
        <option>Year 3</option>
        <option>Year 4</option>
        <option>Year 5</option>
      </select>

      <label>Address</label>
      <textarea rows="2" placeholder="Enter your current address"></textarea>

      <label>Additional Comments</label>
      <textarea rows="3" placeholder="Any special requests or notes..."></textarea>

      <div class="buttons">
        <button class="btn-submit">Submit Registration</button>
        <button class="btn-reset">Reset</button>
      </div>
    </div>

    <!-- Unit Registration -->
    <div class="header">Unit Registration</div>
    <div class="form-section">
      <label>Unit Name</label>
      <input type="text" placeholder="e.g. Financial Accounting II" required/>

      <label>Unit Code</label>
      <input type="text" placeholder="e.g. ACC 202" required/>

      <label>Lecturer</label>
      <input type="text" placeholder="Dr. Jane Mwangi" />

      <label>Semester</label>
      <select required>
        <option value="">Select Semester</option>
        <option>Semester 1</option>
        <option>Semester 2</option>
      </select>

      <label style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
        <input type="checkbox" style="width:auto;"/>
        <span>Active Unit (Currently Enrolled)</span>
      </label>

      <div class="buttons">
        <button class="btn-submit">Register Unit</button>
        <button class="btn-reset">Reset</button>
      </div>
    </div>
  </div>

</body>
</html>
