
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Unit Registration - CAT 2</title>
  <style>
    :root {
      --primary: #17A2B8;
      --bg: #FAFAFA;
      --text: #2C3E50;
      --neutral: #E9ECEF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 10px;
    }

    /* Top Menu Bar */
    .menu-bar {
      background: #0066CC;
      color: white;
      padding: 8px 15px;
      display: flex;
      gap: 30px;
      font-size: 15px;
      font-weight: 500;
      position: relative;
      z-index: 100;
    }

    .menu-item {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      position: relative;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Dropdown */
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      border-radius: 6px;
      min-width: 160px;
      z-index: 200;
      padding: 6px 0;
    }

    .menu-item:hover .dropdown {
      display: block;
    }

    .dropdown a {
      display: block;
      padding: 10px 20px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
    }

    .dropdown a:hover {
      background: var(--neutral);
      color: var(--primary);
    }

    /* Form Container */
    .form-container {
      max-width: 520px;
      margin: 20px auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .section {
      padding: 25px 20px;
      background: #FFF9E6;
    }

    .section + .section {
      border-top: 1px solid #eee;
    }

    h2 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 22px;
      font-size: 22px;
      font-weight: 700;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      font-size: 15px;
      color: #2C3E50;
    }

    input[type="text"], 
    input[type="email"], 
    input[type="tel"], 
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--neutral);
      border-radius: 6px;
      background: white;
      font-size: 16px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
    }

    .btn-submit:hover {
      background: #138496;
    }

    .btn-reset {
      background: #F9C74F;
      color: #2C3E50;
    }

    .btn-reset:hover {
      background: #f4b93a;
    }
  </style>
</head>
<body>

    <div class="menu-item">

    <!-- Format Menu -->
    <div class="menu-item">
      Format
      <div class="dropdown">
        <a href="#">Bold</a>
        <a href="#">Italic</a>
        <a href="#">Underline</a>
      </div>
    </div>

  </div>
